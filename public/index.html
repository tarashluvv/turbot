<script>
  let interval = null;
  let backendUrl = '';

  function connect() {
    const input = document.getElementById('backend-url').value.trim().replace(/\/$/, '');
    if (!input) return;
    backendUrl = input;
    if (interval) clearInterval(interval);
    poll();
    interval = setInterval(poll, 3000);
  }

  async function poll() {
    try {
      const res = await fetch(`${backendUrl}/status`);
      const data = await res.json();
      updateUI(data);
    } catch (e) {
      setStatus('waiting', 'cannot reach backend');
    }
  }

  function updateUI({ status, qr }) {
    const dot = document.getElementById('dot');
    const qrImg = document.getElementById('qr-img');
    const qrPlaceholder = document.getElementById('qr-placeholder');
    const qrArea = document.getElementById('qr-area');
    const readyState = document.getElementById('ready-state');
    const instruction = document.getElementById('instruction');

    dot.className = dot ${status};

    if (status === 'qr' && qr) {
      setStatus('qr', 'scan with whatsapp');
      qrPlaceholder.style.display = 'none';
      readyState.style.display = 'none';
      qrImg.style.display = 'block';
      qrImg.src = qr;
      qrArea.classList.add('scanning');
      qrArea.style.background = '#fff';
      instruction.textContent = 'open whatsapp > linked devices > link a device';
    } else if (status === 'ready') {
      setStatus('ready', 'active');
      qrPlaceholder.style.display = 'none';
      qrImg.style.display = 'none';
      qrArea.classList.remove('scanning');
      qrArea.style.background = 'var(--surface)';
      readyState.style.display = 'flex';
      instruction.textContent = 'bot is running and monitoring your group';
      if (interval) clearInterval(interval);
    } else {
      setStatus('waiting', 'waiting for bot');
      qrPlaceholder.style.display = 'flex';
      qrImg.style.display = 'none';
      readyState.style.display = 'none';
      qrArea.classList.remove('scanning');
      qrArea.style.background = 'var(--surface)';
      instruction.textContent = 'bot is starting up...';
    }
  }
